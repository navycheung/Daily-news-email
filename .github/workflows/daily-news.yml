name: Daily News Brief
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
jobs:
  send-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Send email
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 send_news.py
